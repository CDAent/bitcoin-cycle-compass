name: release-tag-guard

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-tag-points-to-main-head:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag target is latest main
        run: |
          git fetch origin main --tags
          TAG_SHA="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          MAIN_SHA="$(git rev-parse "origin/main")"
          echo "Tag SHA: ${TAG_SHA}"
          echo "Main SHA: ${MAIN_SHA}"
          if [ "${TAG_SHA}" != "${MAIN_SHA}" ]; then
            echo "Tag does not point to latest origin/main"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify release consistency
        run: |
          python3 scripts/verify_release.py
